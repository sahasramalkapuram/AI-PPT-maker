<form action="/generate/outline" method="POST" class="bg-slate-900 border border-slate-800 rounded-3xl p-6 shadow-2xl space-y-4">
    <div>
        <label class="block text-xs font-bold text-violet-400 uppercase tracking-widest mb-2">Topic or Presentation Outline Prompt</label>
        <textarea name="prompt" rows="3" required class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-violet-500 font-medium transition" placeholder="e.g., An elegant outline detailing the Photoelectric Effect theory..."></textarea>
    </div>
    
    <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-4 pt-2">
        <div>
            <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Slide Visual Aesthetic</label>
            <select name="theme" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2 text-white focus:outline-none focus:ring-2 focus:ring-violet-500 text-sm">
                <option value="modern">Modern Obsidian (Deep Dark)</option>
                <option value="academic">Academic Clean (Ivory Light)</option>
                <option value="cyberpunk">CyberNeon Grid (Vibrant Contrast)</option>
                <option value="emerald">Deep Forest (Emerald & Gold)</option>
                <option value="sunset">Warm Terracotta (Luxury Pastel)</option>
                <option value="ocean">Oceanic Minimalist (Navy Blue & Teal)</option>
            </select>
        </div>

        <div>
            <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">No. of Slides</label>
            <select name="slide_count" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2 text-white focus:outline-none focus:ring-2 focus:ring-violet-500 text-sm">
                <option value="3">3 Slides (Quick Deck)</option>
                <option value="5" selected>5 Slides (Standard)</option>
                <option value="7">7 Slides (Detailed Report)</option>
                <option value="10">10 Slides (Exhaustive Thesis)</option>
            </select>
        </div>

        <div>
            <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Content Length</label>
            <select name="content_length" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2 text-white focus:outline-none focus:ring-2 focus:ring-violet-500 text-sm">
                <option value="short and punchy bullet notes">Short & Punchy Notes</option>
                <option value="highly detailed informative sentences" selected>Detailed Paragraph Bullets</option>
                <option value="exhaustive academic research analysis text strings">Exhaustive Scientific Text</option>
            </select>
        </div>

        <div>
            <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Slide Visual Assets</label>
            <select name="include_visuals" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2 text-white focus:outline-none focus:ring-2 focus:ring-violet-500 text-sm">
                <option value="none" selected>Text Presentation Only</option>
                <option value="images">Auto-Embed Unsplash Images</option>
                <option value="charts">Auto-Embed Data Graphs & Charts</option>
                <option value="both">Embed Both Images & Charts</option>
            </select>
        </div>
    </div>
    
    <div class="flex justify-end pt-2">
        <button type="submit" class="bg-gradient-to-r from-violet-600 to-indigo-600 text-white font-bold py-2.5 px-6 rounded-xl hover:from-violet-500 hover:to-indigo-500 shadow-xl shadow-violet-600/20 transition cursor-pointer">🪄 Research & Generate</button>
    </div>
</form>
