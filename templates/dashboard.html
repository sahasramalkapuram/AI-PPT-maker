<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Presentation Workspace</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="min-h-screen bg-slate-950 text-slate-100 flex items-center justify-center p-6">
  
  <div class="w-full max-w-3xl bg-slate-900 border border-slate-800 rounded-2xl shadow-2xl p-8 space-y-6">
    
    <div class="border-b border-slate-800 pb-4">
      <h1 class="text-2xl font-bold bg-gradient-to-r from-violet-400 to-emerald-400 bg-clip-text text-transparent">
        AI Presentation Workspace
      </h1>
      <p class="text-sm text-slate-400 mt-1">Configure your slide layout options and content parameters below.</p>
    </div>

    <form action="/generate/outline" method="POST" class="space-y-6">
      
      <div class="space-y-2">
        <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400">Presentation Topic or Core Prompt</label>
        <textarea 
          name="prompt" 
          rows="3" 
          placeholder="e.g., The implications of a parallel world theory in modern quantum mechanics..."
          class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-sm text-slate-200 focus:outline-none focus:border-violet-500 focus:ring-1 focus:ring-violet-500 transition resize-none"
          required
        ></textarea>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        
        <div class="space-y-2">
          <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400">Slide Visual Aesthetic</label>
          <select name="aesthetic" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-sm text-slate-300 focus:outline-none focus:border-violet-500 transition">
            <option value="warm-terracotta">Warm Terracotta (Luxury Pastel)</option>
            <option value="cyberpunk" selected>Neon Cyberpunk (Dark Tech)</option>
            <option value="minimal-scandi">Minimalist Scandinavian (Clean & Light)</option>
          </select>
        </div>

        <div class="space-y-2">
          <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400">No. of Slides</label>
          <select name="slide_count" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-sm text-slate-300 focus:outline-none focus:border-violet-500 transition">
            <option value="5">5 Slides (Quick Pitch)</option>
            <option value="7" selected>7 Slides (Detailed Presentation)</option>
            <option value="10">10 Slides (Deep Dive Report)</option>
          </select>
        </div>

        <div class="space-y-2">
          <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400">Content Length</label>
          <select name="content_length" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-sm text-slate-300 focus:outline-none focus:border-violet-500 transition">
            <option value="bullets">Concise Bullet Points</option>
            <option value="detailed" selected>Detailed Explanations</option>
          </select>
        </div>

        <div class="space-y-2">
          <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400">Slide Visual Assets</label>
          <select name="assets" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-sm text-slate-300 focus:outline-none focus:border-violet-500 transition">
            <option value="both" selected>Embed Both Images & Charts</option>
            <option value="images">Images Only</option>
            <option value="charts">Charts Only</option>
          </select>
        </div>

      </div>

      <div class="pt-4">
        <button 
          type="submit" 
          class="w-full bg-gradient-to-r from-violet-600 to-indigo-600 hover:from-violet-500 hover:to-indigo-500 text-white font-medium py-3.5 px-4 rounded-xl shadow-lg shadow-indigo-950/50 transition duration-200 transform active:scale-[0.99] flex items-center justify-center space-x-2 cursor-pointer"
        >
          <span>Research & Generate Deck</span>
        </button>
      </div>

    </form>
  </div>

</body>
</html>
