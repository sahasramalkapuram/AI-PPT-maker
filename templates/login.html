<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - SlideAI Workspace</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-radial from-slate-900 via-violet-950 to-slate-950 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white/10 backdrop-blur-xl border border-white/10 p-8 rounded-3xl shadow-2xl max-w-md w-full text-center">
        <h1 class="text-3xl font-black bg-gradient-to-r from-violet-400 to-indigo-300 bg-clip-text text-transparent tracking-tight mb-2">✨ SlideAI Studio</h1>
        <p class="text-violet-200/70 text-sm mb-8">Generate premium, fully styled slide presentations using AI for free.</p>
        
        <form action="/login/email" method="POST" class="space-y-4 text-left">
            <div>
                <label class="block text-xs font-bold text-violet-300 uppercase tracking-widest mb-1.5">Student Email Address</label>
                <input type="email" name="email" required class="w-full bg-slate-950/40 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-violet-500 transition" placeholder="student@university.edu">
            </div>
            <button type="submit" class="w-full bg-violet-600 text-white font-bold py-3 rounded-xl hover:bg-violet-500 shadow-lg shadow-violet-600/30 transition cursor-pointer">Enter Workspace</button>
        </form>
    </div>
</body>
</html>
