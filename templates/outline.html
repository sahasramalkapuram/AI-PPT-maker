<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generated Presentation Design Deck</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="min-h-screen p-8 transition-colors duration-300
    {% if aesthetic == 'cyberpunk' %} bg-slate-950 text-slate-100
    {% elif aesthetic == 'warm-terracotta' %} bg-stone-900 text-amber-50
    {% elif aesthetic == 'minimal-scandi' %} bg-zinc-50 text-zinc-900
    {% elif aesthetic == 'royal-emerald' %} bg-emerald-950 text-emerald-50
    {% elif aesthetic == 'midnight-navy' %} bg-blue-950 text-slate-100
    {% endif %}">

    <div class="max-w-5xl mx-auto space-y-8">
        
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center border-b pb-6 gap-4
            {% if aesthetic == 'minimal-scandi' %} border-zinc-200 {% else %} border-slate-800 {% endif %}">
            <div>
                <span class="text-xs font-bold uppercase tracking-widest text-indigo-400">Production Layout Framework</span>
                <h1 class="text-3xl font-extrabold mt-1">Topic: "{{ prompt }}"</h1>
                <p class="text-sm opacity-70 mt-1">Active Presentation System Design Scheme: <span class="font-mono underline">{{ aesthetic }}</span></p>
            </div>
            <a href="/dashboard" class="text-xs px-4 py-2.5 rounded-xl font-medium border transition duration-150
                {% if aesthetic == 'minimal-scandi' %} bg-zinc-200 border-zinc-300 hover:bg-zinc-300 text-zinc-800 {% else %} bg-slate-900 border-slate-800 hover:border-slate-700 text-slate-200 {% endif %}">
                ← Adjust Presentation Parameters
            </a>
        </div>

        <div class="space-y-8">
            {% for slide in slides %}
                {% set slide_index = loop.index0 %}
                
                <div class="rounded-2xl border p-6 grid grid-cols-1 md:grid-cols-12 gap
